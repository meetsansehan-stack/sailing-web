<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sailing — 내 아이 신청·마감 레이더 (프로토타입)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FBF6EE;
    --card: #FFFDF9;
    --card-line: #ECE3D4;
    --ink: #2E2A24;
    --ink-soft: #6E665A;
    --ocean: #2B5566;       /* Sailing 항법 */
    --ocean-soft: #5C8494;
    --action: #BC5B45;      /* 직접 신청 */
    --action-bg: #F8E8E1;
    --auto: #9A7C3A;        /* 자동/확인 */
    --auto-bg: #F2EAD6;
    --sand: #E9DECA;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    padding: 0 0 60px;
  }
  /* ── 헤더 ── */
  header.app {
    padding: 30px 22px 18px;
    border-bottom: 1px solid var(--card-line);
  }
  .brand {
    font-family: 'Nanum Myeongjo', serif;
    font-weight: 800;
    font-size: 21px;
    letter-spacing: 0.5px;
    color: var(--ocean);
    margin: 0;
  }
  .brand .dot { color: var(--action); }
  .tagline {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 6px 0 0;
  }
  h1.radar-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 23px;
    font-weight: 800;
    line-height: 1.4;
    margin: 22px 22px 4px;
    color: var(--ink);
  }
  .radar-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 22px 18px;
  }
  /* ── 세그먼트 토글 ── */
  .seg {
    display: flex;
    gap: 8px;
    margin: 0 22px 8px;
  }
  .seg button {
    flex: 1;
    border: 1px solid var(--card-line);
    background: var(--card);
    color: var(--ink-soft);
    border-radius: 14px;
    padding: 12px 8px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .seg button .em { display:block; font-size:12px; opacity:.7; margin-top:2px; }
  .seg button.on {
    background: var(--ocean);
    border-color: var(--ocean);
    color: #fff;
    font-weight: 700;
  }
  .seg button.on .em { opacity:.85; }
  /* ── 범례 ── */
  .legend {
    display:flex; gap:14px; margin: 12px 22px 6px; font-size:12px; color:var(--ink-soft);
  }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .dotmark { width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dm-action { background: var(--action); }
  .dm-auto { background: var(--auto); }
  /* ── 타임라인 ── */
  .timeline { padding: 8px 16px 0; }
  .item {
    position: relative;
    background: var(--card);
    border: 1px solid var(--card-line);
    border-radius: 16px;
    margin: 11px 0;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,.015);
  }
  .item-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 15px 16px;
    cursor: pointer;
  }
  .when {
    flex: 0 0 auto;
    min-width: 58px;
    font-size: 11.5px;
    color: var(--ocean);
    font-weight: 700;
    line-height: 1.35;
    padding-top: 2px;
  }
  .body-col { flex: 1; min-width: 0; }
  .row1 { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .badge {
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .badge.action { background: var(--action-bg); color: var(--action); }
  .badge.auto { background: var(--auto-bg); color: var(--auto); }
  .it-title {
    font-size: 15.5px;
    font-weight: 700;
    margin: 7px 0 3px;
    line-height: 1.4;
  }
  .it-teaser { font-size: 13px; color: var(--ink-soft); margin: 0; }
  .chev {
    flex: 0 0 auto;
    color: var(--ocean-soft);
    font-size: 13px;
    padding-top: 3px;
    transition: transform .2s ease;
  }
  .item.open .chev { transform: rotate(180deg); }
  /* ── 상세 ── */
  .detail {
    display: none;
    padding: 2px 18px 18px;
    border-top: 1px dashed var(--card-line);
    margin-top: 2px;
  }
  .item.open .detail { display: block; animation: fade .22s ease; }
  @keyframes fade { from { opacity:0; transform: translateY(-3px);} to {opacity:1; transform:none;} }
  .detail h3 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 14.5px;
    color: var(--ocean);
    margin: 16px 0 7px;
    font-weight: 700;
  }
  .detail ul { margin: 0; padding-left: 18px; }
  .detail li { font-size: 13.5px; margin: 5px 0; }
  .detail li b { color: var(--ink); }
  .src {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--card-line);
    font-size: 11.5px;
    color: var(--ink-soft);
  }
  .src .lab { display:inline-flex; align-items:center; gap:5px; font-weight:700; color: var(--ocean); margin-bottom:5px;}
  .src a { color: var(--ocean-soft); text-decoration: none; word-break: break-all; }
  .src a:hover { text-decoration: underline; }
  /* ── 푸터 약속 ── */
  .promise {
    margin: 22px 18px 0;
    background: linear-gradient(135deg, #2B5566, #3C6B7C);
    color: #fff;
    border-radius: 16px;
    padding: 18px 18px;
  }
  .promise b { font-family:'Nanum Myeongjo', serif; font-size:15px; }
  .promise p { margin: 7px 0 0; font-size:13px; opacity:.92; line-height:1.6; }
  .note { text-align:center; font-size:11px; color:var(--ink-soft); margin: 18px 22px 0; opacity:.8;}
</style>
</head>
<body>
<div class="phone">
  <header class="app">
    <p class="brand">⚓ Sailing<span class="dot">.</span></p>
    <p class="tagline">오늘의 좌표부터, 먼 수평선까지</p>
  </header>

  <h1 class="radar-title" id="rtitle"></h1>
  <p class="radar-sub" id="rsub"></p>

  <div class="seg">
    <button data-seg="kinder" class="on">🐣 유치원 입학<span class="em">앞두고 있어요</span></button>
    <button data-seg="elem">🎒 초등학교 입학<span class="em">앞두고 있어요</span></button>
  </div>

  <div class="legend">
    <span><i class="dotmark dm-action"></i> 직접 신청해야 받아요</span>
    <span><i class="dotmark dm-auto"></i> 자동으로 와요 (확인만)</span>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="promise">
    <b>흩어진 신청·마감을 '내 아이 일정' 하나로.</b>
    <p>정확한 날짜는 보통 가을~겨울에 교육청·학교가 공지해요. Sailing이 <b>내 동네·내 아이 기준</b>으로 미리 챙겨서, 놓치면 손해 보는 것만 콕 알려드릴게요.</p>
  </div>
  <p class="note">※ 프로토타입 — 일정은 직전 학년도(2026학년도) 실제 기준. 2027학년도 정확 일정은 추후 공지 반영.</p>
</div>

const timeline = document.getElementById('timeline');
const rtitle = document.getElementById('rtitle');
const rsub = document.getElementById('rsub');

function render(seg) {
  const d = DATA[seg];
  rtitle.innerHTML = d.title;
  rsub.textContent = d.sub;
  timeline.innerHTML = d.items.map((it, i) => {
    const badge = it.type === 'action'
      ? '<span class="badge action">직접 신청</span>'
      : '<span class="badge auto">자동</span>';
    const sections = it.sections.map(s =>
      `<h3>${s.h}</h3><ul>${s.b.map(x => `<li>${x}</li>`).join('')}</ul>`
    ).join('');
    const src = it.src && it.src.length
      ? `<div class="src"><span class="lab">📎 출처 (직접 확인 가능)</span><br>${
          it.src.map(s => `<a href="${s.u}" target="_blank" rel="noopener">${s.l} ↗</a>`).join('<br>')
        }</div>`
      : '';
    return `
      <div class="item" data-i="${i}">
        <div class="item-head">
          <div class="when">${it.when}</div>
          <div class="body-col">
            <div class="row1">${badge}</div>
            <div class="it-title">${it.title}</div>
            <p class="it-teaser">${it.teaser}</p>
          </div>
          <div class="chev">▼</div>
        </div>
        <div class="detail">${sections}${src}</div>
      </div>`;
  }).join('');

  timeline.querySelectorAll('.item').forEach(el => {
    el.querySelector('.item-head').addEventListener('click', () => el.classList.toggle('open'));
  });
}

document.querySelectorAll('.seg button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.seg button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    render(btn.dataset.seg);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

render('kinder');
</script>
