[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm && pnpm install --filter @parenting-newsletter/api... --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @parenting-newsletter/api exec tsc --noEmit"]

[start]
cmd = "cd apps/api && node --import tsx src/index.ts"
