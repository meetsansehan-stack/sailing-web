[phases.setup]
nixPkgs = ["nodejs_23"]

[phases.install]
cmds = ["npx --yes pnpm@11 install --filter @parenting-newsletter/api... --frozen-lockfile"]

[phases.build]
cmds = ["npx pnpm@11 --filter @parenting-newsletter/api exec tsc --noEmit"]

[start]
cmd = "cd apps/api && node --import tsx src/index.ts"
