packages:
  - 'apps/*'
  - 'packages/*'
  - 'agents/*'

# allowBuilds: 빌드 스크립트 실행을 명시적으로 허용한 패키지 목록.
# 모두 잘 알려진 정상 패키지 (Prisma 클라이언트 생성, esbuild 플랫폼 바이너리 다운로드 등 필수 동작).
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
